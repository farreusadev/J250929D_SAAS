{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    
    <title>{% block title %}Autenticación{% endblock %} | SaaS Platform</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="{% static 'tailadmin/favicon.ico' %}">
    
    <!-- TailAdmin CSS -->
    <link rel="stylesheet" href="{% static 'tailadmin/css/style.css' %}">
    
    <!-- Custom CSS -->
    {% block extra_css %}{% endblock %}
</head>

<body 
    x-data="{ darkMode: false }"
    x-init="
        darkMode = JSON.parse(localStorage.getItem('darkMode')) || false;
        $watch('darkMode', value => localStorage.setItem('darkMode', JSON.stringify(value)))"
    :class="{'dark bg-gray-900': darkMode === true}"
    class="bg-gray-50"
>
    
    <div class="flex min-h-screen flex-col items-center justify-center p-4">
        
        <!-- Auth Card -->
        <div class="w-full max-w-md">
            
            <!-- Logo -->
            <div class="mb-8 text-center">
                <a href="#" class="inline-block">
                    <img class="dark:hidden" src="{% static 'tailadmin/images/logo/auth-logo.svg' %}" alt="Logo" />
                    <img class="hidden dark:block" src="{% static 'tailadmin/images/logo/auth-logo.svg' %}" alt="Logo" />
                </a>
            </div>
            
            <!-- Card -->
            <div class="rounded-lg border border-gray-200 bg-white p-8 shadow-lg dark:border-gray-800 dark:bg-gray-900">
                {% block auth_content %}
                <!-- Auth content goes here -->
                {% endblock %}
            </div>
            
            <!-- Footer Links -->
            <div class="mt-6 text-center">
                {% block auth_footer %}
                <p class="text-sm text-gray-500 dark:text-gray-400">
                    © 2025 SaaS Platform. Todos los derechos reservados.
                </p>
                {% endblock %}
            </div>
            
        </div>
        
        <!-- Dark Mode Toggle -->
        <button
            @click="darkMode = !darkMode"
            class="fixed bottom-6 right-6 flex h-12 w-12 items-center justify-center rounded-full bg-white text-gray-500 shadow-lg hover:bg-gray-100 dark:bg-gray-900 dark:text-gray-400 dark:hover:bg-gray-800"
        >
            <svg x-show="!darkMode" class="fill-current" width="24" height="24" viewBox="0 0 24 24" fill="none">
                <path d="M12 17.75C9.66 17.75 7.75 15.84 7.75 13.5C7.75 11.16 9.66 9.25 12 9.25C14.34 9.25 16.25 11.16 16.25 13.5C16.25 15.84 14.34 17.75 12 17.75ZM12 10.75C10.49 10.75 9.25 11.99 9.25 13.5C9.25 15.01 10.49 16.25 12 16.25C13.51 16.25 14.75 15.01 14.75 13.5C14.75 11.99 13.51 10.75 12 10.75Z" fill=""/>
                <path d="M12 4.75C11.59 4.75 11.25 4.41 11.25 4V2C11.25 1.59 11.59 1.25 12 1.25C12.41 1.25 12.75 1.59 12.75 2V4C12.75 4.41 12.41 4.75 12 4.75Z" fill=""/>
            </svg>
            <svg x-show="darkMode" class="fill-current" width="24" height="24" viewBox="0 0 24 24" fill="none" style="display: none;">
                <path d="M21.0672 11.8568L20.4253 11.469L21.0672 11.8568ZM12.1432 2.93276L11.7553 2.29085V2.29085L12.1432 2.93276Z" fill=""/>
            </svg>
        </button>
        
    </div>
    
    <!-- TailAdmin JS Bundle -->
    <script src="{% static 'tailadmin/js/bundle.js' %}"></script>
    
    <!-- Custom JS -->
    {% block extra_js %}{% endblock %}
    
</body>
</html>
